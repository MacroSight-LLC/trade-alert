name: trade-alert tests

on:
  push:
    paths:
      - "models.py"
      - "merger.py"
      - "db.py"
      - "notifier_and_logger.py"
      - "healthcheck.py"
      - "outcome_tracker.py"
      - "langfuse_client.py"
      - "prompt_manager.py"
      - "pipeline_tracing.py"
      - "trace_analyzer.py"
      - "vault_env_loader.py"
      - "dashboard_api.py"
      - "alert_quality.py"
      - "normalizers/**"
      - "tests/unit/**"
      - "tests/conftest.py"
      - ".github/workflows/trade-alert-tests.yml"
  pull_request:
    paths:
      - "models.py"
      - "merger.py"
      - "db.py"
      - "notifier_and_logger.py"
      - "healthcheck.py"
      - "outcome_tracker.py"
      - "langfuse_client.py"
      - "prompt_manager.py"
      - "pipeline_tracing.py"
      - "trace_analyzer.py"
      - "vault_env_loader.py"
      - "dashboard_api.py"
      - "alert_quality.py"
      - "normalizers/**"
      - "tests/unit/**"
      - "tests/conftest.py"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pydantic httpx psycopg2-binary redis pytest pytest-cov mypy ruff "hvac>=2.0.0" "langfuse>=2.0,<3.0" python-dotenv "fastapi[standard]" uvicorn

      - name: Lint with ruff
        run: ruff check models.py merger.py db.py notifier_and_logger.py healthcheck.py outcome_tracker.py langfuse_client.py prompt_manager.py pipeline_tracing.py trace_analyzer.py vault_env_loader.py dashboard_api.py alert_quality.py normalizers/

      - name: Format check with ruff
        run: |
          ruff format --check \
            models.py merger.py db.py notifier_and_logger.py \
            healthcheck.py outcome_tracker.py langfuse_client.py \
            prompt_manager.py pipeline_tracing.py trace_analyzer.py \
            vault_env_loader.py dashboard_api.py alert_quality.py normalizers/

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --tb=short --cov=. --cov-report=term-missing \
            --ignore=tests/unit/test_plan_controller_prompt.py \
            --ignore=tests/unit/test_llm_override.py \
            --cov-include="models.py,merger.py,db.py,notifier_and_logger.py,healthcheck.py,outcome_tracker.py,langfuse_client.py,prompt_manager.py,pipeline_tracing.py,trace_analyzer.py,dashboard_api.py,alert_quality.py,normalizers/*"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build CUGA image
        run: docker build -f docker/Dockerfile.cuga -t trade-alert:ci .
      - name: Build MCP image
        run: docker build -f docker/Dockerfile.mcp -t trade-alert-mcp:ci .
      - name: Validate compose config
        run: docker compose config --quiet
