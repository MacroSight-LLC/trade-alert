name: Manual Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Bump version and tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure Git
        run: |
          git config user.name "cuga-agent[bot]"
          git config user.email "cuga-agent[bot]@users.noreply.github.com"

      - name: Switch to main and pull
        run: |
          git fetch origin main
          git checkout main
          git pull origin main

      - name: Bump version and release
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          CURRENT=$(grep '^version' pyproject.toml | sed -n 's/version = "\(.*\)"/\1/p')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          case "$BUMP" in
            major) NEW_VERSION=$((MAJOR+1)).0.0 ;;
            minor) NEW_VERSION=$MAJOR.$((MINOR+1)).0 ;;
            patch) NEW_VERSION=$MAJOR.$MINOR.$((PATCH+1)) ;;
            *) echo "Invalid bump: $BUMP"; exit 1 ;;
          esac
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" pyproject.toml
          uv sync
          git add pyproject.toml uv.lock
          git commit -m "chore: release v$NEW_VERSION"
          git push origin main
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"
          echo "Released v$NEW_VERSION"
