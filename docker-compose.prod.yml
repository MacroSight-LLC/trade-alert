# trade-alert production stack (SSOT §§3, 5)
# Infrastructure + app + cron. MCP services require --profile mcp.
# Usage:
#   docker compose -f docker-compose.prod.yml up -d                 # infra + app + cron
#   docker compose -f docker-compose.prod.yml --profile mcp up -d   # full stack with MCPs

services:
  # --- Infrastructure ---

  vault:
    image: hashicorp/vault:1.15.0
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_LOCAL_CONFIG: '{"storage":{"file":{"path":"/vault/file"}},"listener":{"tcp":{"address":"0.0.0.0:8200","tls_disable":true}},"ui":true}'
    command: vault server -config=/vault/config
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/vault/file
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://0.0.0.0:8200/v1/sys/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trade-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trade-net
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: trade_alert
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trade-net
    restart: unless-stopped

  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
    volumes:
      - langfuse-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trade-net
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3000
      SALT: ${SALT:-defaultsalt}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TELEMETRY_ENABLED: "false"
      HOSTNAME: "0.0.0.0"
      LANGFUSE_INIT_ORG_NAME: "trade-alert"
      LANGFUSE_INIT_PROJECT_NAME: "trade-alert"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: "admin@trade-alert.local"
      LANGFUSE_INIT_USER_NAME: "admin"
      LANGFUSE_INIT_USER_PASSWORD: "admin-trade-alert"
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://0.0.0.0:3000/api/public/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trade-net
    restart: unless-stopped

  # --- MCP Services (ports 8001-8010, SSOT §3) ---
  # All share one image built from docker/Dockerfile.mcp (mock server).
  # Activate with: docker compose --profile mcp up -d

  tradingview-mcp:
    build: &mcp-build
      context: .
      dockerfile: docker/Dockerfile.mcp
    image: trade-alert-mcp:latest
    profiles: [mcp]
    command: ["8001"]
    ports:
      - "8001:8001"
    environment: &mcp-env
      MODE: ${MCP_MODE:-live}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
    env_file: &mcp-envfile
      - path: .env
        required: false
    healthcheck: &mcp-health
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8001/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  polygon-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8002"]
    ports:
      - "8002:8002"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8002/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  discord-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8003"]
    ports:
      - "8003:8003"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8003/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  finnhub-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8004"]
    ports:
      - "8004:8004"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8004/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  rot-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8005"]
    ports:
      - "8005:8005"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8005/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  crypto-orderbook-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8006"]
    ports:
      - "8006:8006"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8006/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  coingecko-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8007"]
    ports:
      - "8007:8007"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8007/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  trading-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8008"]
    ports:
      - "8008:8008"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8008/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  fred-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8009"]
    ports:
      - "8009:8009"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8009/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  spamshield-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8010"]
    ports:
      - "8010:8010"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8010/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  # --- Application ---

  cuga:
    build:
      context: .
      dockerfile: docker/Dockerfile.cuga
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      langfuse:
        condition: service_healthy
    # cron service handles scheduling via supercronic + crontab.
    # This container stays warm for: docker compose exec cuga python ...
    command: ["sleep", "infinity"]
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./workflows:/app/workflows
      - ./normalizers:/app/normalizers
      - ./models.py:/app/models.py
      - ./merger.py:/app/merger.py
      - ./db.py:/app/db.py
      - ./notifier_and_logger.py:/app/notifier_and_logger.py
      - ./healthcheck.py:/app/healthcheck.py
      - ./outcome_tracker.py:/app/outcome_tracker.py
      - ./trace_analyzer.py:/app/trace_analyzer.py
      - ./langfuse_client.py:/app/langfuse_client.py
      - ./prompt_manager.py:/app/prompt_manager.py
      - ./pipeline_tracing.py:/app/pipeline_tracing.py
      - ./pipeline_runner.py:/app/pipeline_runner.py
      - ./vault_env_loader.py:/app/vault_env_loader.py
      - ./logs:/app/logs
    env_file:
      - path: .env
      - path: .env.vault
        required: false
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://trade_alert:${POSTGRES_PASSWORD}@postgres:5432/trade_alert
      DYNACONF_ADVANCED_FEATURES__LANGFUSE_TRACING: "true"
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: http://langfuse:3000
      PROMPT_VERSION: ${PROMPT_VERSION:-v1.0}
    networks:
      - trade-net
    restart: unless-stopped

  cron:
    build:
      context: .
      dockerfile: docker/Dockerfile.cuga
    depends_on:
      - cuga
    volumes:
      - ./workflows:/app/workflows
      - ./normalizers:/app/normalizers
      - ./models.py:/app/models.py
      - ./merger.py:/app/merger.py
      - ./db.py:/app/db.py
      - ./notifier_and_logger.py:/app/notifier_and_logger.py
      - ./healthcheck.py:/app/healthcheck.py
      - ./outcome_tracker.py:/app/outcome_tracker.py
      - ./trace_analyzer.py:/app/trace_analyzer.py
      - ./langfuse_client.py:/app/langfuse_client.py
      - ./prompt_manager.py:/app/prompt_manager.py
      - ./pipeline_tracing.py:/app/pipeline_tracing.py
      - ./pipeline_runner.py:/app/pipeline_runner.py
      - ./vault_env_loader.py:/app/vault_env_loader.py
      - ./logs:/app/logs
      - ./crontab:/etc/crontabs/root
    # Cron scheduler — runs pipeline_runner.py on schedule via supercronic.
    # See crontab file for schedule definitions.
    command:
      [
        "bash",
        "-c",
        "curl -fsSL https://github.com/aptible/supercronic/releases/download/v0.2.29/supercronic-linux-amd64 -o /usr/local/bin/supercronic && chmod +x /usr/local/bin/supercronic && exec supercronic /etc/crontabs/root",
      ]
    env_file:
      - path: .env
      - path: .env.vault
        required: false
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://trade_alert:${POSTGRES_PASSWORD}@postgres:5432/trade_alert
      DYNACONF_ADVANCED_FEATURES__LANGFUSE_TRACING: "true"
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: http://langfuse:3000
      PROMPT_VERSION: ${PROMPT_VERSION:-v1.0}
    networks:
      - trade-net
    restart: unless-stopped

volumes:
  redis-data:
  vault-data:
  langfuse-data:

networks:
  trade-net:
