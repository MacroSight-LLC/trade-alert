  spamshield-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8010"]
    ports:
      - "8010:8010"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8010/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  # --- Application ---

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.cuga
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      langfuse:
        condition: service_healthy
    env_file:
      - path: .env
      - path: .env.secrets
        required: false
      - path: .env.vault
        required: false
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://trade_alert:${POSTGRES_PASSWORD}@postgres:5432/trade_alert
      DYNACONF_ADVANCED_FEATURES__LANGFUSE_TRACING: "true"
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: http://langfuse:3000
      PROMPT_VERSION: ${PROMPT_VERSION:-v1.0}
    volumes:
      - ./workflows:/app/workflows
      - ./normalizers:/app/normalizers
      - ./models.py:/app/models.py
      - ./merger.py:/app/merger.py
      - ./db.py:/app/db.py
      - ./notifier_and_logger.py:/app/notifier_and_logger.py
      - ./healthcheck.py:/app/healthcheck.py
      - ./outcome_tracker.py:/app/outcome_tracker.py
      - ./trace_analyzer.py:/app/trace_analyzer.py
      - ./langfuse_client.py:/app/langfuse_client.py
      - ./prompt_manager.py:/app/prompt_manager.py
      - ./pipeline_tracing.py:/app/pipeline_tracing.py
      - ./pipeline_runner.py:/app/pipeline_runner.py
      - ./alert_quality.py:/app/alert_quality.py
      - ./langfuse_datasets.py:/app/langfuse_datasets.py
      - ./vault_env_loader.py:/app/vault_env_loader.py
      - ./logs:/app/logs
      - ./tests:/app/tests
    command: ["sleep", "infinity"]
    networks:
      - trade-net
    restart: unless-stopped

  # --- Dashboard (Phase 9) ---

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
      - path: .env.secrets
        required: false
      - path: .env.vault
        required: false
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      DATABASE_URL: postgresql://trade_alert:${POSTGRES_PASSWORD}@postgres:5432/trade_alert
    ports:
      - "8080:8080"
    volumes:
      - ./dashboard_api.py:/app/dashboard_api.py
      - ./dashboard.html:/app/dashboard.html
      - ./db.py:/app/db.py
      - ./models.py:/app/models.py
      - ./vault_env_loader.py:/app/vault_env_loader.py
    command: ["python", "-m", "uvicorn", "dashboard_api:app", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/api/summary')\""]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

volumes:
  postgres_data:
  langfuse_data:

networks:
  trade-net:
