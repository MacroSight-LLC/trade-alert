# trade-alert Docker Compose — development/local topology (SSOT §3, §5)
# Full service stack: Redis, Postgres, 10 MCP servers, app runner.
# Usage: docker compose up
# NOTE: Uses same images as prod. Set POSTGRES_PASSWORD in .env before starting.

services:
  # --- Infrastructure ---

  vault:
    image: hashicorp/vault:1.15.0
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trade-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - trade-net

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: trade_alert
      POSTGRES_USER: trade_alert
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trade_alert"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trade-net

  # --- MCP Services (ports 8001-8010, SSOT §3) ---

  tradingview-mcp:
    image: ghcr.io/macrosight-llc/tradingview-mcp:latest
    ports:
      - "8001:8001"
    env_file:
      - .env
      - .env.vault
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  polygon-mcp:
    image: ghcr.io/macrosight-llc/polygon-mcp:latest
    ports:
      - "8002:8002"
    env_file:
      - .env
      - .env.vault
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  discord-mcp:
    image: ghcr.io/macrosight-llc/discord-mcp:latest
    ports:
      - "8003:8003"
    env_file:
      - .env
      - .env.vault
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8003/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  finnhub-mcp:
    image: ghcr.io/macrosight-llc/finnhub-mcp:latest
    ports:
      - "8004:8004"
    env_file:
      - .env
      - .env.vault
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8004/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  rot-mcp:
    image: ghcr.io/macrosight-llc/rot-mcp:latest
    ports:
      - "8005:8005"
    env_file:
      - .env
      - .env.vault
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8005/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  crypto-orderbook-mcp:
    image: ghcr.io/macrosight-llc/crypto-orderbook-mcp:latest
    ports:
      - "8006:8006"
    env_file:
      - .env
      - .env.vault
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8006/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  coingecko-mcp:
    image: ghcr.io/macrosight-llc/coingecko-mcp:latest
    ports:
      - "8007:8007"
    env_file:
      - .env
      - .env.vault
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8007/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  trading-mcp:
    image: ghcr.io/macrosight-llc/trading-mcp:latest
    ports:
      - "8008:8008"
    env_file:
      - .env
      - .env.vault
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8008/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  fred-mcp:
    image: ghcr.io/macrosight-llc/fred-mcp:latest
    ports:
      - "8009:8009"
    env_file:
      - .env
      - .env.vault
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8009/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  spamshield-mcp:
    image: ghcr.io/macrosight-llc/spamshield-mcp:latest
    ports:
      - "8010:8010"
    env_file:
      - .env
      - .env.vault
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8010/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  # --- Application ---

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.cuga
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
      - .env.vault
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://trade_alert:${POSTGRES_PASSWORD}@postgres:5432/trade_alert
    volumes:
      - .:/app
    networks:
      - trade-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  trade-net:
