    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8004/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  rot-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8005"]
    ports:
      - "8005:8005"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8005/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  crypto-orderbook-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8006"]
    ports:
      - "8006:8006"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8006/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  coingecko-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8007"]
    ports:
      - "8007:8007"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8007/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  trading-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8008"]
    ports:
      - "8008:8008"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8008/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  fred-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8009"]
    ports:
      - "8009:8009"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8009/health'')"',
