# trade-alert Docker Compose — development/local topology (SSOT §3, §5)
# Infrastructure + app. MCP services require --profile mcp.
# Usage:
#   docker compose up -d                    # infra + app only
#   docker compose --profile mcp up -d      # full stack with MCPs

services:
  # --- Infrastructure ---

  vault:
    image: hashicorp/vault:1.15.0
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://0.0.0.0:8200/v1/sys/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trade-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - trade-net

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: trade_alert
      POSTGRES_USER: trade_alert
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trade_alert"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trade-net

  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
    volumes:
      - langfuse_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trade-net
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3000
      SALT: ${SALT:-defaultsalt}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TELEMETRY_ENABLED: "false"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://0.0.0.0:3000/api/public/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trade-net
    restart: unless-stopped

  # --- MCP Services (ports 8001-8010, SSOT §3) ---
  # All share one image built from docker/Dockerfile.mcp (live API integrations).
  # Activate with: docker compose --profile mcp up -d

  tradingview-mcp:
    build: &mcp-build
      context: .
      dockerfile: docker/Dockerfile.mcp
    image: trade-alert-mcp:latest
    profiles: [mcp]
    command: ["8001"]
    ports:
      - "8001:8001"
    environment: &mcp-env
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-dev-root-token}
    env_file: &mcp-envfile
      - path: .env
        required: false
      - path: .env.secrets
        required: false
    healthcheck: &mcp-health-8001
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8001/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  polygon-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8002"]
    ports:
      - "8002:8002"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8002/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - trade-net
    restart: unless-stopped

  discord-mcp:
    image: trade-alert-mcp:latest
    depends_on:
      tradingview-mcp:
        condition: service_started
    profiles: [mcp]
    command: ["8003"]
    ports:
      - "8003:8003"
    environment: *mcp-env
    env_file: *mcp-envfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8003/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
