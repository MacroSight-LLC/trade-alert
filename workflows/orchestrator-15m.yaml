# orchestrator-15m.yaml
# SSOT Reference: Section 2, 5, 13 — Cron orchestrator for 15m pipeline
# Purpose: Top-level cron workflow that sequences every collector → merger →
#   decision → notifier for the 15m timeframe. Runs every 15 minutes.

name: orchestrator-15m
description: >
    Cron orchestrator — 15m pipeline. Runs every 15 minutes.
    Sequences: collectors → merger → decision → notifier.
schedule: "*/15 * * * *"
llm_model: claude-sonnet-4-20250514

error_handling:
    abort_on_failure: false
    retry:
        max_attempts: 2
        backoff_seconds: 10

steps:
    # Step 0 — Create Langfuse pipeline trace (session_id linkage for trace_analyzer)
    # This makes the full pipeline visible in the Langfuse timeline.
    - name: init-trace
      type: code
      code: |
          import logging
          logger = logging.getLogger(__name__)
          try:
              from pipeline_tracing import create_pipeline_trace
              trace_id = create_pipeline_trace("15m", metadata={"schedule": "*/15 * * * *"})
              result = {"trace_id": trace_id}
          except Exception as exc:
              logger.warning("Pipeline trace init failed (non-blocking): %s", exc)
              result = {"trace_id": None}

    # Step 0b — Flush stale snapshots from the previous cycle
    # Prevents mixing old and fresh collector data in the merger.
    - name: flush-stale-snapshots
      type: code
      code: |
          import os, logging, redis
          logger = logging.getLogger(__name__)
          try:
              r = redis.from_url(os.environ.get("REDIS_URL", "redis://redis:6379"), decode_responses=True)
              deleted = 0
              for key in ["snapshots:15m", "snapshots:1h"]:
                  deleted += r.delete(key)
              logger.info("Flushed %d stale snapshot keys before collector run", deleted)
          except Exception as exc:
              logger.warning("Snapshot flush failed (non-blocking): %s", exc)

    # Step 1 — Record collector start time, run all 5 in parallel, then
    # post a parent span + per-collector child spans to Langfuse.
    - name: collector-start-ts
      type: code
      code: |
          import time
          result = {"ts": time.monotonic()}

    - name: run-collectors
      type: parallel
      abort_on_failure: false
      workflows:
          - collector-market.yaml
          - collector-ta.yaml
          - collector-flow.yaml
          - collector-sentiment.yaml
          - collector-macro.yaml

    # Step 1b — Record parent + per-collector spans in Langfuse
    - name: span-collectors
      type: code
      code: |
          import time, logging
          from datetime import datetime, timezone, timedelta
          logger = logging.getLogger(__name__)
          try:
              from pipeline_tracing import span_step, add_score
              from langfuse_client import get_langfuse_client
              tid = steps["init-trace"]["trace_id"]
              collector_results = steps.get("run-collectors", {})
              total = len(collector_results)
              succeeded = sum(1 for v in collector_results.values() if v is not None)
              failed_names = [k for k, v in collector_results.items() if v is None]
              health = succeeded / max(total, 1)

              # Compute real wall-clock duration for the parent span
              start_mono = steps["collector-start-ts"]["ts"]
              elapsed = time.monotonic() - start_mono
              now = datetime.now(tz=timezone.utc)
              span_start = now - timedelta(seconds=elapsed)

              # Parent span with actual timing
              lf = get_langfuse_client()
              if lf and tid:
                  parent_span = lf.trace(id=tid).span(
                      name="run-collectors",
                      start_time=span_start,
                      input={"workflows": total},
                      level="WARNING" if failed_names else "DEFAULT",
                  )
                  parent_span.end(
                      end_time=now,
                      output={"status": "completed", "succeeded": succeeded, "failed": failed_names},
                      status_message=f"{succeeded}/{total} collectors succeeded",
                      metadata={"duration_s": round(elapsed, 3)},
                  )
                  # Per-collector child spans (equal share of parent duration)
                  per_collector_s = elapsed / max(total, 1)
                  for i, (name, res) in enumerate(collector_results.items()):
                      c_start = span_start + timedelta(seconds=i * per_collector_s)
                      c_end = c_start + timedelta(seconds=per_collector_s)
                      child = parent_span.span(
                          name=f"collector-{name.replace('.yaml','')}",
                          start_time=c_start,
                          level="ERROR" if res is None else "DEFAULT",
                      )
                      child.end(
                          end_time=c_end,
                          output={"status": "ok" if res is not None else "failed"},
                          status_message="ok" if res is not None else "failed",
                      )

              add_score(tid, "collector_health", health,
                        comment=f"{succeeded}/{total} collectors completed" + (f" (failed: {', '.join(failed_names)})" if failed_names else ""))
          except Exception as exc:
              logger.debug("Collector span failed (non-blocking): %s", exc)

    # Step 2 — Merge snapshots from Redis and get macro regime
    # SSOT §9: merger.merge returns top N symbols by aggregate strength
    - name: run-merger
      type: code
      code: |
          import json
          import logging
          from merger import merge, get_macro_regime

          logger = logging.getLogger(__name__)

          try:
              from pipeline_tracing import span_step
              tid = steps["init-trace"]["trace_id"]
          except Exception:
              tid = None

          try:
              from pipeline_tracing import add_score, tag_trace
          except ImportError:
              add_score = tag_trace = None

          try:
              with span_step(tid, "run-merger") as ctx:
                  snapshots = merge("15m", limit=20)
                  macro = get_macro_regime()

                  snapshots_json = json.dumps(
                      [snap.model_dump() for snap in snapshots], indent=2
                  )
                  n = len(snapshots)
                  logger.info(
                      "Orchestrator-15m merger: %d candidates, macro risk_on=%s",
                      n,
                      macro.get("risk_on", "unknown"),
                  )
                  result = {
                      "snapshots_json": snapshots_json,
                      "macro": macro,
                      "n": n,
                  }
                  ctx["output"] = {"symbols": n, "risk_on": macro.get("risk_on")}

                  # Score merger — normalize candidate count (20 = 1.0)
                  if add_score and tid:
                      add_score(tid, "merger_candidates", min(n / 20.0, 1.0),
                                comment=f"{n} symbols merged")
                  # Tag trace with macro regime
                  if tag_trace and tid:
                      regime = "risk-on" if macro.get("risk_on") else "risk-off"
                      tag_trace(tid, [f"macro:{regime}", f"candidates:{n}"])
          except Exception as exc:
              logger.error("Orchestrator-15m merger failed: %s", exc)
              result = {"snapshots_json": "[]", "macro": {}, "n": 0}
              if add_score and tid:
                  add_score(tid, "merger_candidates", 0.0, comment="merger failed")

    # Step 3 — Run decision engine for 15m timeframe
    # SSOT §10.2: ensemble reasoning via Claude Sonnet
    # Pass merged snapshot data to avoid redundant Redis read in decision.
    - name: run-decision
      type: workflow
      workflow: decision-15m.yaml
      inputs:
          merged_snapshots_json: '{{ steps["run-merger"]["snapshots_json"] }}'
          merged_macro: '{{ steps["run-merger"]["macro"] }}'
          merged_n: '{{ steps["run-merger"]["n"] }}'

    # Step 4 — Healthcheck: verify Redis, Postgres, recent alerts
    # SSOT §13: log results, alert ops channel on failure
    - name: healthcheck
      type: code
      code: |
          import logging
          logger = logging.getLogger(__name__)
          try:
              from healthcheck import run_healthcheck
              run_healthcheck(timeframe="15m")
          except Exception as exc:
              logger.error("Healthcheck step failed: %s", exc)

    # Step 5a — Flush Langfuse queue so LLM generation costs are available
    - name: flush-langfuse
      type: code
      code: |
          import logging, time
          logger = logging.getLogger(__name__)
          try:
              from langfuse_client import get_langfuse_client
              lf = get_langfuse_client()
              if lf:
                  lf.flush()
                  time.sleep(1)  # allow server-side processing
                  logger.debug("Langfuse flushed before trace analysis")
          except Exception as exc:
              logger.debug("Langfuse flush failed (non-blocking): %s", exc)

    # Step 5b — Post-run trace analysis: validate output, check cost/latency
    # Scores the trace in Langfuse and alerts ops on any issues
    - name: analyze-pipeline-trace
      type: code
      code: |
          import logging
          logger = logging.getLogger(__name__)
          try:
              from trace_analyzer import analyze_pipeline_trace
              result = analyze_pipeline_trace("15m")
              logger.info("Trace analysis: healthy=%s issues=%s", result.is_healthy, result.issues)
          except Exception as exc:
              logger.error("Trace analysis failed (non-blocking): %s", exc)

    # Step 6 — Finalise Langfuse pipeline trace with rich output summary
    - name: finalise-trace
      type: code
      code: |
          import logging
          logger = logging.getLogger(__name__)
          try:
              from pipeline_tracing import end_pipeline_trace, add_score, tag_trace
              tid = steps["init-trace"]["trace_id"]

              # Gather pipeline-wide summary
              merger_n = steps.get("run-merger", {}).get("n", 0)
              output = {
                  "timeframe": "15m",
                  "status": "completed",
                  "merger_candidates": merger_n,
              }

              # Score overall pipeline completeness (reached finalise = 1.0)
              add_score(tid, "pipeline_completeness", 1.0,
                        comment="pipeline reached finalise step")

              # Tag with timeframe for easy Langfuse filtering
              tag_trace(tid, ["status:completed"])

              end_pipeline_trace(tid, output=output, metadata={
                  "merger_candidates": merger_n,
              })
          except Exception as exc:
              logger.debug("Trace finalisation failed (non-blocking): %s", exc)

    # On total pipeline failure, notify ops channel
    - name: on-failure-notify
      type: code
      run_on: failure
      code: |
          import logging
          logger = logging.getLogger(__name__)
          try:
              from notifier_and_logger import send_ops_message
              send_ops_message("⚠️ orchestrator-15m failed")
          except Exception as exc:
              logger.error("Failed to send ops failure message: %s", exc)
