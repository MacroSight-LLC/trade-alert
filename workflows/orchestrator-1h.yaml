# orchestrator-1h.yaml
# SSOT Reference: Section 2, 5, 13 — Cron orchestrator for 1h pipeline
# Purpose: Top-level cron workflow that sequences every collector → merger →
#   decision → notifier for the 1h timeframe. Runs at the top of every hour.

name: orchestrator-1h
description: >
  Cron orchestrator — 1h pipeline. Runs at the top of every hour.
  Sequences: collectors → merger → decision → notifier.
schedule: "0 * * * *"
llm_model: claude-3-5-sonnet-20241022

error_handling:
  abort_on_failure: false
  retry:
    max_attempts: 2
    backoff_seconds: 10

steps:
  # Step 0 — Create Langfuse pipeline trace (session_id linkage for trace_analyzer)
  # This makes the full pipeline visible in the Langfuse timeline.
  - name: init-trace
    type: code
    code: |
      import logging
      logger = logging.getLogger(__name__)
      try:
          from pipeline_tracing import create_pipeline_trace
          trace_id = create_pipeline_trace("1h", metadata={"schedule": "0 * * * *"})
          result = {"trace_id": trace_id}
      except Exception as exc:
          logger.warning("Pipeline trace init failed (non-blocking): %s", exc)
          result = {"trace_id": None}

  # Step 1 — Run all 5 collector workflows in parallel
  # SSOT §8: collectors must handle partial failures without aborting
  - name: run-collectors
    type: parallel
    abort_on_failure: false
    workflows:
      - collector-market.yaml
      - collector-ta.yaml
      - collector-flow.yaml
      - collector-sentiment.yaml
      - collector-macro.yaml

  # Step 1b — Record collector span in Langfuse
  - name: span-collectors
    type: code
    code: |
      import logging
      logger = logging.getLogger(__name__)
      try:
          from pipeline_tracing import span_step
          tid = steps["init-trace"]["trace_id"]
          with span_step(tid, "run-collectors", input_data={"workflows": 5}) as ctx:
              ctx["output"] = {"status": "completed"}
              ctx["status_message"] = "5 collectors executed"
      except Exception as exc:
          logger.debug("Collector span failed (non-blocking): %s", exc)

  # Step 2 — Merge snapshots from Redis and get macro regime
  # SSOT §9: merger.merge returns top N symbols by aggregate strength
  - name: run-merger
    type: code
    code: |
      import json
      import logging
      from merger import merge, get_macro_regime

      logger = logging.getLogger(__name__)

      try:
          from pipeline_tracing import span_step
          tid = steps["init-trace"]["trace_id"]
      except Exception:
          tid = None

      try:
          with span_step(tid, "run-merger") as ctx:
              snapshots = merge("1h", limit=20)
              macro = get_macro_regime()

              snapshots_json = json.dumps(
                  [snap.model_dump() for snap in snapshots], indent=2
              )
              logger.info(
                  "Orchestrator-1h merger: %d candidates, macro risk_on=%s",
                  len(snapshots),
                  macro.get("risk_on", "unknown"),
              )
              result = {
                  "snapshots_json": snapshots_json,
                  "macro": macro,
                  "n": len(snapshots),
              }
              ctx["output"] = {"symbols": len(snapshots)}
      except Exception as exc:
          logger.error("Orchestrator-1h merger failed: %s", exc)
          result = {"snapshots_json": "[]", "macro": {}, "n": 0}

  # Step 3 — Run decision engine for 1h timeframe
  # SSOT §10.3: ensemble reasoning via Claude Sonnet (stricter gates)
  - name: run-decision
    type: workflow
    workflow: decision-1h.yaml

  # Step 4 — Healthcheck: verify Redis, Postgres, recent alerts
  # SSOT §13: log results, alert ops channel on failure
  - name: healthcheck
    type: code
    code: |
      import logging
      logger = logging.getLogger(__name__)
      try:
          from healthcheck import run_healthcheck
          run_healthcheck(timeframe="1h")
      except Exception as exc:
          logger.error("Healthcheck step failed: %s", exc)

  # Step 5 — Post-run trace analysis: validate output, check cost/latency
  # Scores the trace in Langfuse and alerts ops on any issues
  - name: analyze-pipeline-trace
    type: code
    code: |
      import logging
      logger = logging.getLogger(__name__)
      try:
          from trace_analyzer import analyze_pipeline_trace
          result = analyze_pipeline_trace("1h")
          logger.info("Trace analysis: healthy=%s issues=%s", result.is_healthy, result.issues)
      except Exception as exc:
          logger.error("Trace analysis failed (non-blocking): %s", exc)

  # Step 6 — Finalise Langfuse pipeline trace with output summary
  - name: finalise-trace
    type: code
    code: |
      import logging
      logger = logging.getLogger(__name__)
      try:
          from pipeline_tracing import end_pipeline_trace
          tid = steps["init-trace"]["trace_id"]
          end_pipeline_trace(tid, output={"timeframe": "1h", "status": "completed"})
      except Exception as exc:
          logger.debug("Trace finalisation failed (non-blocking): %s", exc)

  # On total pipeline failure, notify ops channel
  - name: on-failure-notify
    type: code
    run_on: failure
    code: |
      import logging
      logger = logging.getLogger(__name__)
      try:
          from notifier_and_logger import send_ops_message
          send_ops_message("⚠️ orchestrator-1h failed")
      except Exception as exc:
          logger.error("Failed to send ops failure message: %s", exc)
