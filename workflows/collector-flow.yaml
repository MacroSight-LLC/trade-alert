# collector-flow.yaml
# SSOT Reference: Section 8 - Collector Workflows (collector-flow)
# Purpose: Collect volume and order flow signals.
# Reads universe:equities and universe:crypto from Redis; writes to snapshots:15m.

name: collector-flow
description: Collect volume spikes and order book imbalance signals
llm_model: claude-sonnet-4-20250514

mcp_servers:
  - name: polygon-mcp
    endpoint: http://polygon-mcp:8002
  - name: crypto-orderbook-mcp
    endpoint: http://crypto-orderbook-mcp:8006

steps:
  # Step 0 -- Early-exit check for POLYGON_API_KEY
  # Without a Polygon key the aggs call returns empty; skip the full collector to save ~110s
  - name: check-api-keys
    type: code
    code: |
      import os
      polygon_key = os.environ.get("POLYGON_API_KEY", "")
      has_polygon = bool(polygon_key and polygon_key != "your_polygon_api_key_here")
      result = {"has_polygon": has_polygon}

  # Step 1 -- Read universes from Redis
  # SSOT S8: read universe:equities and universe:crypto set by collector-market
  - name: read-universes
    type: code
    code: |
      import json
      import os
      import redis

      r = redis.from_url(os.environ.get("REDIS_URL", "redis://localhost:6379"), decode_responses=True)

      equities_raw = r.get("universe:equities")
      crypto_raw   = r.get("universe:crypto")

      equities = json.loads(equities_raw) if equities_raw else ["AAPL", "MSFT", "NVDA", "TSLA", "SPY"]
      crypto   = json.loads(crypto_raw)   if crypto_raw   else ["BTC", "ETH", "SOL"]

      # If no polygon key, clear equities to skip polygon call
      has_polygon = steps["check-api-keys"]["has_polygon"]
      if not has_polygon:
          import logging
          logging.getLogger(__name__).info("POLYGON_API_KEY not set — skipping equity flow signals")
          equities = []

      result = {"equities": equities, "crypto": crypto, "has_polygon": has_polygon}

  # Step 2 -- Parallel: Polygon unusual_activity + aggs and crypto-orderbook imbalance
  # SSOT S3: Polygon -- batch symbols; query only screener subset (max 25 per call)
  # SSOT S3: crypto-orderbook MCP -- only for symbols marked as crypto (batch 15)
  - name: fetch-flow-signals
    type: parallel_tool_calls
    calls:
      # Polygon aggs for equities -- volume_multiple = current_volume / avg_20d_volume
      # SSOT S7 Flow: compute volume_multiple from Polygon aggs
      # Limit to 5 equities: free-tier allows 5 req/min, each symbol needs 2 calls
      - tool: polygon-mcp
        method: aggs
        params:
          symbols: "{{ steps['read-universes']['equities'][:5] }}"
          include_avg_20d_volume: true
      # Crypto orderbook imbalance (batch 15)
      - tool: crypto-orderbook-mcp
        method: imbalance
        params:
          symbols: "{{ steps['read-universes']['crypto'][:15] }}"

  # Step 3 -- Code agent: merge polygon + orderbook results, normalize, push to Redis
  # SSOT S7 Flow: volume_multiple scoring -- 1.5-3 => 1.0, 3-5 => 2.5, >=5 => 3.0
  # SSOT S7 Crypto: positive imbalance => order_imbalance_long; negative => order_imbalance_short
  # Redis key: snapshots:15m, TTL 900s
  - name: normalize-and-store-snapshots
    type: code
    code: |
      import json
      import os
      import redis
      from normalizers.flow_normalizer import normalize

      r = redis.from_url(os.environ.get("REDIS_URL", "redis://localhost:6379"), decode_responses=True)
      snapshot_ttl = int(os.environ.get("REDIS_SNAPSHOT_TTL", "900"))

      unusual_results   = {"results": []}  # unusual_activity requires paid Polygon plan
      aggs_results      = steps["fetch-flow-signals"][0]
      orderbook_results = steps["fetch-flow-signals"][1]

      raw = {}
      for item in aggs_results.get("results", []):
          sym = item.get("symbol") or item.get("ticker")
          if sym:
              current_vol = item.get("volume", 0)
              avg_vol     = item.get("avg_20d_volume") or item.get("avg_volume", 1) or 1
              raw[sym] = {
                  "volume_multiple": current_vol / avg_vol,
                  "unusual_options": [],
              }
      for item in unusual_results.get("results", []):
          sym = item.get("symbol") or item.get("ticker")
          if sym and sym in raw:
              raw[sym]["unusual_options"].append(item)
      for item in orderbook_results.get("results", []):
          sym = item.get("symbol") or item.get("ticker")
          if sym:
              if sym not in raw:
                  raw[sym] = {}
              raw[sym]["imbalance"] = item.get("bid_imbalance", item.get("imbalance"))

      n_pushed = 0
      for timeframe in ["15m", "1h"]:
          snapshots = normalize(raw, timeframe=timeframe)
          redis_key = f"snapshots:{timeframe}"
          for snap in snapshots:
              r.lpush(redis_key, snap.model_dump_json())
              r.expire(redis_key, snapshot_ttl)
              n_pushed += 1

      result = {"n_snapshots": n_pushed}

  # Step 4 -- Log completion
  - name: log-completion
    type: code
    code: |
      import logging
      n = steps["normalize-and-store-snapshots"]["n_snapshots"]
      logging.getLogger(__name__).info("Flow collector: %d snapshots pushed to Redis", n)
      result = f"Flow collector: {n} snapshots pushed to Redis"

error_handling:
  # SSOT S8: if crypto-orderbook-mcp unavailable -- skip crypto flow, continue equities.
  # SSOT S8: if Polygon rate limited -- use previous tick's flow data from Redis.
  on_mcp_error:
    crypto-orderbook-mcp:
      strategy: skip
      log: true
      message: "crypto-orderbook-mcp unavailable -- skipping crypto flow signals"
    polygon-mcp:
      strategy: fallback_to_cache
      cache_key: "snapshots:15m"
      log: true
  abort_on_failure: false
  retry:
    max_attempts: 2
    backoff_seconds: 5
