# decision-15m.yaml
# SSOT Reference: Section 10.1, 10.2 - Decision Engine (Ensemble Reasoning)
# Purpose: Ensemble decision agent — merges 15m snapshots, reasons across all
#   signal types using Claude Sonnet, produces PlaybookAlert JSON.
# Reads: snapshots:15m and macro:regime from Redis (via merger.py)
# Calls: fred-mcp for live VIX/yield curve context
# Produces: PlaybookAlert JSON array → handed to notifier (Phase 6)

name: decision-15m
description: >
  Ensemble decision agent — merges 15m snapshots, reasons across all
  signal types using Claude Sonnet, produces PlaybookAlert JSON.
llm_model: claude-3-5-sonnet-20241022

mcp_servers:
  - name: fred-mcp
    endpoint: http://fred-mcp:8009

steps:
  # Step 1 — Merge snapshots from Redis
  # SSOT §9: merger.merge returns top N symbols by aggregate strength
  # SSOT §10.1: accept merged snapshots + macro regime context
  - name: merge-snapshots
    type: code
    code: |
      import json
      import logging
      from merger import merge, get_macro_regime

      logger = logging.getLogger(__name__)

      snapshots = merge("15m", limit=20)
      macro = get_macro_regime()

      if len(snapshots) == 0:
          logger.info("No snapshots available for 15m decision — skipping")
          result = {"skip": True, "snapshots_json": "[]", "macro": {}, "n": 0}
      else:
          snapshots_json = json.dumps(
              [snap.model_dump() for snap in snapshots], indent=2
          )
          logger.info("Decision-15m: merged %d symbols for evaluation", len(snapshots))
          result = {
              "skip": False,
              "snapshots_json": snapshots_json,
              "macro": macro,
              "n": len(snapshots),
          }

  # Step 2 — Fetch live FRED context (VIX + yield curve)
  # SSOT §3: FRED bundle MCP — use in decision prompts
  # Supplements macro regime with fresh data for the prompt
  - name: fetch-fred-context
    type: conditional
    condition: '{{ not steps["merge-snapshots"]["skip"] }}'
    if_true:
      type: parallel_tool_calls
      calls:
        - tool: fred-mcp
          method: vix_level
          params: {}
        - tool: fred-mcp
          method: yield_curve
          params:
            spread: "10Y-2Y"
    if_false:
      type: code
      code: |
        result = [{"vix_level": None}, {"spread_bps": None}]

  # Step 3 — Build ensemble prompt for Claude Sonnet
  # SSOT §10.2: decision prompt with PlaybookAlert schema, gate requirements
  - name: build-prompt
    type: conditional
    condition: '{{ not steps["merge-snapshots"]["skip"] }}'
    if_true:
      type: code
      code: |
        import json

        macro = steps["merge-snapshots"]["macro"]
        snapshots_json = steps["merge-snapshots"]["snapshots_json"]
        n = steps["merge-snapshots"]["n"]

        fred_results = steps["fetch-fred-context"]
        vix = fred_results[0].get("vix_level") or fred_results[0].get("value", "N/A")
        yc = fred_results[1].get("spread_bps") or fred_results[1].get("value", "N/A")

        risk_on = macro.get("risk_on", True)
        macro_summary = f"{'Risk-on' if risk_on else 'Risk-off'}, VIX={vix}, Yield curve={yc}bps"

        system_prompt = """You are a quantitative trading signal evaluator.
        You receive normalized market signals from multiple independent sources
        (technical analysis, volume/flow, sentiment, order book, macro regime).

        Your job: evaluate signal confluence and produce trade playbook alerts
        ONLY when multiple independent signal types agree.

        Rules:
        - Only output alerts where evidence is strong and multi-source
        - Prefer WATCH over LONG/SHORT when conviction is low
        - Be conservative: a missed opportunity is better than a bad trade
        - edge_probability reflects how many independent signal groups agree
          AND how strong/confident those signals are
        - sources_agree = count of distinct signal types pointing same direction
          (technical_trend, volume_spike, sentiment_bull/bear,
           order_imbalance_long/short, macro_risk_off)
        - Output STRICT JSON only — no prose, no markdown, no explanation"""

        user_prompt = f"""Timeframe: 15m
        Macro Regime: {macro_summary}
        VIX: {vix} | Yield Curve: {yc}bps

        Evaluate these {n} symbols and their signals:

        {snapshots_json}

        For each symbol where you find strong multi-source confluence, output
        a PlaybookAlert. Skip symbols with weak or single-source signals.

        Gate requirements (must ALL pass):
        - edge_probability >= 0.70
        - sources_agree >= 3
        - average signal confidence >= 0.75

        Output format — a JSON array (may be empty []):
        [
          {{
            "symbol": "AAPL",
            "direction": "LONG",
            "edge_probability": 0.78,
            "confidence": 0.80,
            "timeframe": "15m",
            "thesis": "One or two sentence causal explanation of WHY this trade.",
            "entry": {{"level": 185.00, "stop": 182.00, "target": 192.00}},
            "timeframe_rationale": "Why 15m is the right timeframe for this.",
            "sentiment_context": "Retail and institutional sentiment summary.",
            "unusual_activity": ["IV spike 2x avg", "options sweep $190c"],
            "macro_regime": "Risk-on, VIX 14, curve normal.",
            "sources_agree": 4
          }}
        ]

        Return [] if no symbols meet the gate requirements.
        Return ONLY the JSON array. No other text."""

        full_prompt = f"SYSTEM:\n{system_prompt}\n\nUSER:\n{user_prompt}"

        result = {"prompt": full_prompt}
    if_false:
      type: code
      code: |
        result = {"prompt": ""}

  # Step 4 — Call Claude Sonnet with ensemble prompt
  # SSOT §10.1: use Claude 3.5 Sonnet as llm_model
  - name: ensemble-decide
    type: conditional
    condition: '{{ not steps["merge-snapshots"]["skip"] }}'
    if_true:
      type: llm
      prompt: '{{ steps["build-prompt"]["prompt"] }}'
    if_false:
      type: code
      code: |
        result = "[]"

  # Step 5 — Validate and filter LLM output against PlaybookAlert + gates
  # SSOT §4: LLM JSON outputs MUST be validated against PlaybookAlert
  # SSOT §10.2: gate — edge_probability >= 0.70, sources_agree >= 3, confidence >= 0.75
  - name: validate-and-filter
    type: conditional
    condition: '{{ not steps["merge-snapshots"]["skip"] }}'
    if_true:
      type: code
      code: |
        import json
        import logging
        from models import PlaybookAlert

        logger = logging.getLogger(__name__)

        llm_response = steps["ensemble-decide"]

        try:
            raw = json.loads(llm_response)
            assert isinstance(raw, list)
        except Exception as e:
            logger.error("Decision engine JSON parse error: %s", e)
            logger.error("Raw response: %s", str(llm_response)[:500])
            result = {"alerts_json": "[]", "count": 0}
        else:
            alerts = []
            for item in raw:
                try:
                    alert = PlaybookAlert(**item)
                    # Re-enforce gates (belt and suspenders)
                    if (alert.edge_probability >= 0.70
                            and alert.sources_agree >= 3
                            and alert.confidence >= 0.75):
                        alerts.append(alert)
                    else:
                        logger.info(
                            "Alert filtered post-validation: %s ep=%.2f sa=%d conf=%.2f",
                            alert.symbol, alert.edge_probability,
                            alert.sources_agree, alert.confidence,
                        )
                except Exception as e:
                    logger.warning("PlaybookAlert validation failed for %s: %s", item, e)

            logger.info("Decision-15m: %d alerts passed gates", len(alerts))
            alerts_json = json.dumps([a.model_dump() for a in alerts])
            result = {"alerts_json": alerts_json, "count": len(alerts)}
    if_false:
      type: code
      code: |
        result = {"alerts_json": "[]", "count": 0}

  # Step 6 — Hand off to notifier (Phase 6 stub)
  # SSOT §11: notifier_and_logger.py will parse alerts_json and send Discord embeds
  - name: hand-off-to-notifier
    type: conditional
    condition: '{{ steps["validate-and-filter"]["count"] > 0 }}'
    if_true:
      type: code
      code: |
        import json
        import logging

        logger = logging.getLogger(__name__)

        alerts_json = steps["validate-and-filter"]["alerts_json"]
        count = steps["validate-and-filter"]["count"]

        # TODO: Phase 6 — call notifier_and_logger.py with alerts_json
        # from notifier_and_logger import notify
        # notify(alerts_json)

        logger.info("Decision-15m: handed %d alerts to notifier", count)
        result = {"notified": True, "count": count}
    if_false:
      type: code
      code: |
        import logging
        logger = logging.getLogger(__name__)
        logger.info("Decision-15m: no alerts passed gates — nothing to notify")
        result = {"notified": False, "count": 0}

error_handling:
  # SSOT §10.2: LLM timeout — log and skip this tick
  # JSON parse failure — log raw response (first 500 chars) and skip
  # Validation failure per alert — skip that alert, continue others
  # Never crash the workflow — always complete gracefully
  on_mcp_error:
    fred-mcp:
      strategy: fallback_to_cache
      cache_key: "macro:regime"
      log: true
      message: "FRED MCP unavailable — using cached macro data"
  on_rate_limit:
    strategy: skip_symbol
    log: true
  abort_on_failure: false
  retry:
    max_attempts: 2
    backoff_seconds: 5
