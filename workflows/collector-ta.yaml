# collector-ta.yaml
# SSOT Reference: Section 8 - Collector Workflows (collector-ta)
# Purpose: Collect technical analysis signals for the universe.
# Reads universe:equities and universe:crypto from Redis; writes snapshots:15m and snapshots:1h.

name: collector-ta
description: Collect TA signals from TradingView and trading-mcp for all universe symbols
llm_model: claude-sonnet-4-20250514

mcp_servers:
  - name: tradingview-mcp
    endpoint: http://tradingview-mcp:8001
  - name: trading-mcp
    endpoint: http://trading-mcp:8008

steps:
  # Step 1 -- Read universes from Redis
  # SSOT S8: read universe:equities and universe:crypto set by collector-market
  - name: read-universes
    type: code
    code: |
      import json
      import os
      import redis

      r = redis.from_url(os.environ.get("REDIS_URL", "redis://localhost:6379"), decode_responses=True)

      equities_raw = r.get("universe:equities")
      crypto_raw   = r.get("universe:crypto")

      equities = json.loads(equities_raw) if equities_raw else ["AAPL", "MSFT", "NVDA", "TSLA", "SPY"]
      crypto   = json.loads(crypto_raw)   if crypto_raw   else ["BTC", "ETH", "SOL"]

      result = {"equities": equities, "crypto": crypto}

  # Step 2 -- TradingView bollinger_scan + rsi_scan for equities and crypto (15m)
  # SSOT S3: TradingView MCP -- batch symbols/timeframes to respect rate limits (max 20 per call)
  # Sequential calls to avoid TradingView 429 rate limits. Each call processes
  # symbols serially with 2s delay. 15m signals reused for 1h snapshots.
  - name: fetch-tv-eq-bollinger
    type: tool_call
    tool: tradingview-mcp
    method: bollinger_scan
    params:
      symbols: "{{ steps['read-universes']['equities'][:10] }}"
      timeframe: "15m"

  - name: fetch-tv-eq-rsi
    type: tool_call
    tool: tradingview-mcp
    method: rsi_scan
    params:
      symbols: "{{ steps['read-universes']['equities'][:10] }}"
      timeframe: "15m"

  - name: fetch-tv-crypto-bollinger
    type: tool_call
    tool: tradingview-mcp
    method: bollinger_scan
    params:
      symbols: "{{ steps['read-universes']['crypto'][:10] }}"
      timeframe: "15m"

  - name: fetch-tv-crypto-rsi
    type: tool_call
    tool: tradingview-mcp
    method: rsi_scan
    params:
      symbols: "{{ steps['read-universes']['crypto'][:10] }}"
      timeframe: "15m"

  # Step 3 -- trading-mcp screen for fundamental context on equities only
  # SSOT S3: trading-mcp fundamental filters (P/E, sector) as context, not final signal
  - name: fetch-fundamentals
    type: tool_call
    tool: trading-mcp
    method: screen
    params:
      symbols: "{{ steps['read-universes']['equities'] }}"
      fields: ["pe_ratio", "sector", "market_cap"]
      limit: 50

  # Step 4 -- Code agent: normalize raw results, push snapshots to Redis
  # SSOT S7: pass raw results to ta_normalizer.normalize -- do not call MCPs inside normalizer
  # Redis keys: snapshots:15m and snapshots:1h, TTL 900s
  - name: normalize-and-store-snapshots
    type: code
    code: |
      import json
      import os
      import redis
      from normalizers.ta_normalizer import normalize

      r = redis.from_url(os.environ.get("REDIS_URL", "redis://localhost:6379"), decode_responses=True)
      snapshot_ttl = int(os.environ.get("REDIS_SNAPSHOT_TTL", "900"))

      # Sequential tool_call steps (no longer parallel_tool_calls):
      #   fetch-tv-eq-bollinger, fetch-tv-eq-rsi, fetch-tv-crypto-bollinger, fetch-tv-crypto-rsi
      raw_bb_eq = steps.get("fetch-tv-eq-bollinger", {})
      raw_rsi_eq = steps.get("fetch-tv-eq-rsi", {})
      raw_bb_crypto = steps.get("fetch-tv-crypto-bollinger", {})
      raw_rsi_crypto = steps.get("fetch-tv-crypto-rsi", {})

      n_pushed = 0
      for timeframe in ["15m", "1h"]:
          merged = {}

          # Merge bollinger results (equities + crypto)
          for raw in [raw_bb_eq, raw_bb_crypto]:
              items = raw.get("results", []) if isinstance(raw, dict) else []
              for item in items:
                  sym = item.get("symbol", "")
                  if not sym:
                      continue
                  merged.setdefault(sym, {"indicators": {}, "patterns": []})
                  merged[sym]["indicators"]["bb_squeeze"] = item.get("squeeze", False)
                  bb_pos = item.get("bb_position", 0.5)
                  merged[sym]["indicators"]["bb_position"] = bb_pos
                  merged[sym]["indicators"]["bb_width"] = round(abs(bb_pos - 0.5) * 2, 4)
                  if item.get("squeeze") and "bb_squeeze" not in merged[sym]["patterns"]:
                      merged[sym]["patterns"].append("bb_squeeze")

          # Merge RSI results (equities + crypto)
          for raw in [raw_rsi_eq, raw_rsi_crypto]:
              items = raw.get("results", []) if isinstance(raw, dict) else []
              for item in items:
                  sym = item.get("symbol", "")
                  if not sym:
                      continue
                  merged.setdefault(sym, {"indicators": {}, "patterns": []})
                  rsi = item.get("rsi", 50.0)
                  merged[sym]["indicators"]["rsi"] = rsi
                  # Compute rating from RSI: center at 50, scale to [-3, +3]
                  merged[sym]["rating"] = round((rsi - 50) / 50 * 3, 2)
                  if rsi < 30 or rsi > 70:
                      if "trend_change" not in merged[sym]["patterns"]:
                          merged[sym]["patterns"].append("trend_change")

          # Fallback: for symbols with BB data but no RSI, derive rating from bb_position
          for sym, data in merged.items():
              if "rating" not in data:
                  bb_pos = data.get("indicators", {}).get("bb_position")
                  if bb_pos is not None:
                      # bb_position 0→lower band, 0.5→mid, 1→upper band
                      # Map to [-1.5, +1.5] range (weaker signal than RSI)
                      data["rating"] = round((bb_pos - 0.5) * 3, 2)
                  elif data.get("indicators", {}).get("bb_squeeze"):
                      data["rating"] = 0.0  # neutral — squeeze detected but no direction

          snapshots = normalize(merged, timeframe=timeframe)
          redis_key = f"snapshots:{timeframe}"
          for snap in snapshots:
              r.lpush(redis_key, snap.model_dump_json())
              r.expire(redis_key, snapshot_ttl)
              n_pushed += 1

      result = {"n_snapshots": n_pushed}

  # Step 5 -- Log completion
  - name: log-completion
    type: code
    code: |
      import logging
      n = steps["normalize-and-store-snapshots"]["n_snapshots"]
      logging.getLogger(__name__).info("TA collector: %d snapshots pushed to Redis", n)
      result = f"TA collector: {n} snapshots pushed to Redis"

error_handling:
  # SSOT S8: skip symbols where TradingView returns rate limit errors; continue with partial results.
  # SSOT S3: respect rate limits -- batch max 20 symbols per call.
  on_rate_limit:
    strategy: skip_symbol
    log: true
  on_mcp_error:
    strategy: continue_partial
    log: true
  abort_on_failure: false
  retry:
    max_attempts: 2
    backoff_seconds: 5
