# collector-ta.yaml
# SSOT Reference: Section 8 - Collector Workflows (collector-ta)
# Purpose: Collect technical analysis signals for the universe.
# Reads universe:equities and universe:crypto from Redis; writes snapshots:15m and snapshots:1h.

name: collector-ta
description: Collect TA signals from TradingView and trading-mcp for all universe symbols
llm_model: grok-beta

mcp_servers:
  - name: tradingview-mcp
    endpoint: http://tradingview-mcp:8001
  - name: trading-mcp
    endpoint: http://trading-mcp:8008

steps:
  # Step 1 -- Read universes from Redis
  # SSOT S8: read universe:equities and universe:crypto set by collector-market
  - name: read-universes
    type: code
    code: |
      import json
      import redis

      r = redis.Redis(host="redis", port=6379, decode_responses=True)

      equities_raw = r.get("universe:equities")
      crypto_raw   = r.get("universe:crypto")

      equities = json.loads(equities_raw) if equities_raw else ["AAPL", "MSFT", "NVDA", "TSLA", "SPY"]
      crypto   = json.loads(crypto_raw)   if crypto_raw   else ["BTC", "ETH", "SOL"]

      result = {"equities": equities, "crypto": crypto}

  # Step 2 -- Parallel: TradingView bollinger_scan + rsi_scan for all symbols
  # SSOT S3: TradingView MCP -- batch symbols/timeframes to respect rate limits (max 20 per call)
  # Timeframes: 15m and 1h per SSOT S8
  - name: fetch-tradingview-signals
    type: parallel_tool_calls
    calls:
      # Equity scans -- 15m
      - tool: tradingview-mcp
        method: bollinger_scan
        params:
