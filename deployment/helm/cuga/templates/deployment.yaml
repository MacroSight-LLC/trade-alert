apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cuga.fullname" . }}
  labels:
    {{- include "cuga.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cuga.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cuga.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 7860
              protocol: TCP
          env:
            {{- if .Values.persistence.dbs.enabled }}
            - name: CUGA_DBS_DIR
              value: "/data/dbs"
            {{- end }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              {{- if and $.Values.existingSecret (or (eq $key "OPENAI_API_KEY") (eq $key "GROQ_API_KEY") (eq $key "OPENAI_BASE_URL")) }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.existingSecret }}
                  key: {{ $key }}
                  optional: true
              {{- else }}
              value: {{ $value | quote }}
              {{- end }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          {{- if .Values.persistence.dbs.enabled }}
          volumeMounts:
            - name: dbs
              mountPath: /data/dbs
          {{- end }}
      {{- if .Values.persistence.dbs.enabled }}
      volumes:
        - name: dbs
          persistentVolumeClaim:
            claimName: {{ include "cuga.fullname" . }}-dbs
      {{- end }}
